  create-release:
    needs: [build-linux]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: linux-bundle
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: RustWallhub ${{ github.ref_name }}
          body: |
            ## RustWallhub ${{ github.ref_name }}

            从 Wallhaven 和 Reddit 下载动漫壁纸的桌面管理器。

            ### 下载
            - Linux: 下载 `*.AppImage` 或 `*.deb` 安装
            - macOS / Windows: 见对应文件

            ### 更新日志
            详见 [CHANGELOG](./CHANGELOG.md)
          files: |
            artifacts/**/*
          draft: true
