name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            args: ''
          - platform: windows-latest
            args: ''
          # - platform: macos-latest
          #   args: '--target aarch64-apple-darwin'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (Tauri)
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Build frontend
        run: deno task build

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'RustWallhub ${{ github.ref_name }}'
          releaseBody: |
            ## RustWallhub ${{ github.ref_name }}

            从 Wallhaven 和 Reddit 下载动漫壁纸的桌面管理器。

            ### 下载
            - Linux: 下载 `*.AppImage` 或 `*.deb` 安装
            - Windows: 下载 `*.msi` 或 `*-setup.exe` 安装

            ### 自动更新
            开启「设置 → 高级设置 → 启动时自动检查更新」后，应用会自动检测新版本。

            ### 更新日志
            详见 [CHANGELOG](./CHANGELOG.md)
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
